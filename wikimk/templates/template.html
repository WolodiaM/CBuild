<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self';
			         img-src 'self' data https://github.com https://img.shields.io;
			         object-src 'none';
			         base-uri 'self';
			         upgrade-insecure-requests;">
		<meta http-equiv="X-Content-Type-Options" content="nosniff">
		<meta name="referrer" content="strict-origin-when-cross-origin">
		<base href="/CBuild/">
		<title>$title$</title>
		<link rel="stylesheet" href="/styles/reset.css">
		<link rel="stylesheet" href="/styles/main.css">
		<link rel="stylesheet" href="/styles/syntax.css">
		<script src="/scripts/theme.js"></script>
		<script src="/scripts/mobile-close-nav-tree.js"></script>
		$if(symbols-page)$
		<script src="/scripts/symbols-redirect.js"></script>
		$endif$
	</head>
	<body>
		<header>
			<div class="header">
				<div class="header-title">
					<p class="header-name">$name$</p>
				</div>
				<div class="header-theme-switcher">
					<button id="theme-switch">NoJS theme</button>
				</div>
			</div>
		</header>
		<div class="nav-container">
			<div class="nav-nav-box">
				<nav>
					<details class="nav-toggle" open>
						<summary>Sitemap</summary>
						$nav.html()$
					</details>
				</nav>
			</div>
			<div class="nav-content-box">
				$body$
			</div>
		</div>
		<footer>
			<div>
				<p class="footer-author">Author: $author$</p>
				<p class="footer-tool">Generated by: <u>WikiMK</u></p>
				<p class="footer-theme">
					<a href="https://github.com/morhetz/gruvbox">Gruvbox theme by morhetz</a>
				</p>
				$if(valid-edit)$
				<p class="footer-edit">
					Edit source markdown on <a href="$EDIT-URL$">$EDIT-FILENAME$</a>
				</p>
				$endif$
				<p class="footer-license">License: $license$</p>
			</div>
		</footer>
	</body>
</html>
