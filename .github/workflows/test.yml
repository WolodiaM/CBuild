name: Run tests for WolodiaM/CBuild
run-name: ${{ github.actor }} running tests for Wolodiam/CBuild
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
jobs:
  test-unix:
    name: Runs tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
        include:
           - os: ubuntu-latest
             cc: gcc
           - os: ubuntu-24.04-arm
             cc: gcc
           - os: macos-latest
             cc: clang
           - os: macos-15-intel
             cc: clang
    # env:
    #     CBUILD_TEST_LOG_FULL: yes
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq build-essential clang valgrind musl musl-tools
      - name: Build test runner
        run: ${{ matrix.cc }} cbuild.c -o cbuild.run
      # - name: Build wikimk (check if it builds)
      #   run: ./cbuild.run docs wikimk
      - name: Run tests
        run: ./cbuild.run test
  test-cygwin:
    name: Runs tests on ${{ matrix.os }} via cygwin
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    defaults:
      run:
        shell: bash.exe -l -o pipefail {0}
    env:
      CHERE_INVOKING: 1
      SHELLOPTS: igncr
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Cygwin and dependencies
        uses: cygwin/cygwin-install-action@v6
        with:
          packages: gcc make valgrind
      - name: Build test runner
        shell: C:\cygwin\bin\bash.exe -l -o pipefail {0}
        run: |
          cd "$(cygpath "$GITHUB_WORKSPACE")"
          gcc cbuild.c -o cbuild.exe
      # - name: Build wikimk (check if it builds)
      #   run: |
      #     cd "$(cygpath "$GITHUB_WORKSPACE")"
      #     ./cbuild.exe docs wikimk
      - name: Run tests
        shell: C:\cygwin\bin\bash.exe -l -o pipefail {0}
        run: |
          cd "$(cygpath "$GITHUB_WORKSPACE")"
          ./cbuild.exe test

  # vmactions/freebsd-vm or cross-platform-actions/action - *BSD