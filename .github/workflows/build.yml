name: Build cbuild.h during release
run-name: ${{ github.actor }} building Wolodiam/CBuild
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    name: Build cbuild.h
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build buildscript
        run: gcc cbuild.c -o cbuild.run
      - name: Build cbuild.h
        run: ./cbuild.run build
      - name: Upload release asset
        run: gh release upload "${TAG_NAME}" "cbuild.h#cbuild.h ${TAG_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}